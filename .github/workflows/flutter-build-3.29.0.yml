
name: Flutter Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: Print Flutter version
        run: flutter --version

      - name: Debug project structure
        run: ls -la

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_so  # Укажите корректную папку

      - name: Build APK for arm64 and armeabi-v7a
        run: flutter build apk --release --target-platform android-arm,android-arm64
        working-directory: flutter_so

      - name: Find libflutter.so
        run: find . -name "libflutter.so"

      - name: Upload libflutter.so for arm64
        uses: actions/upload-artifact@v4
        with:
          name: libflutter_so_arm64
          path: flutter_so/build/app/intermediates/stripped_native_libs/release/out/lib/arm64-v8a/libflutter.so

      - name: Upload libflutter.so for armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: libflutter_so_armeabi_v7a
          path: flutter_so/build/app/intermediates/stripped_native_libs/release/out/lib/armeabi-v7a/libflutter.so
